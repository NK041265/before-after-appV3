<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Before & After Image Generator</title>
    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }
        .control-box {
            background: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            flex: 1 1 300px;
        }
        .control-box.full-width {
            flex-basis: 100%;
        }
        .control-box label {
            font-weight: bold;
            color: #555;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: 'Sarabun', sans-serif;
        }
        input[type="file"] {
            font-size: 14px;
            width: 100%;
        }
        .canvas-container {
            margin: 20px auto;
            max-width: 1000px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            background: #fff;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
        }
        .btn-download {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            font-weight: bold;
            transition: background 0.3s;
            box-shadow: 0 4px 6px rgba(26, 115, 232, 0.3);
            margin-top: 20px;
        }
        .btn-download:hover {
            background-color: #1557b0;
        }
    </style>
</head>
<body>

    <h1>โปรแกรมสร้างภาพเปรียบเทียบ Before & After</h1>

    <div class="controls">
        <div class="control-box">
            <label for="titleInput">✏️ พิมพ์หัวข้อด้านบน:</label>
            <input type="text" id="titleInput" value="เปรียบเทียบผลงาน ก่อนทำ - หลังทำ" oninput="drawCanvas()">
        </div>
        <div class="control-box">
            <label for="beforeInput">⬅️ ภาพก่อนทำ (Before):</label>
            <input type="file" id="beforeInput" accept="image/png, image/jpeg, image/webp" onchange="handleImage(event, 'before')">
        </div>
        <div class="control-box">
            <label for="afterInput">➡️ ภาพหลังทำ (After):</label>
            <input type="file" id="afterInput" accept="image/png, image/jpeg, image/webp" onchange="handleImage(event, 'after')">
        </div>
        <div class="control-box full-width">
            <label for="descInput">📝 พิมพ์คำอธิบายใต้ภาพ:</label>
            <input type="text" id="descInput" value="คำอธิบายรายละเอียดเพิ่มเติมเกี่ยวกับการดำเนินการ" oninput="drawCanvas()">
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="canvas" width="1200" height="750"></canvas>
    </div>

    <button class="btn-download" onclick="downloadImage()">⬇️ ดาวน์โหลดรูปภาพ</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let beforeImg = null;
        let afterImg = null;

        function init() {
            // 1. Draw immediately
            drawCanvas();

            // 2. Explicitly wait for fonts (Modern Browsers)
            if (document.fonts && document.fonts.load) {
                document.fonts.load('bold 36px "Sarabun"').then(function() {
                    drawCanvas();
                }).catch(function(e) {
                    console.log("Font load API error:", e);
                });
            } else if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(function() {
                    drawCanvas();
                });
            }

            // 3. Bulletproof Fallback for older Safari/iOS:
            // Redraw every 300ms for the first 3 seconds to ensure 
            // the font swap is caught even if the API fails to fire.
            let redrawCount = 0;
            let interval = setInterval(function() {
                drawCanvas();
                redrawCount++;
                if (redrawCount > 10) clearInterval(interval);
            }, 300);
        }

        function handleImage(e, type) {
            const file = e.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    if (type === 'before') beforeImg = img;
                    if (type === 'after') afterImg = img;
                    drawCanvas();
                }
                img.onerror = function() {
                    alert("⚠️ ไม่สามารถแสดงผลรูปภาพนี้ได้ครับ! \n\n👉 แนะนำให้ใช้ไฟล์ .JPG หรือ .PNG ครับ");
                    e.target.value = '';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        function drawCanvas() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const title = document.getElementById('titleInput').value;
            const desc = document.getElementById('descInput').value;
            
            const headerHeight = 70; 
            const footerHeight = 80; 
            const imgWidth = canvas.width / 2;
            const imgHeight = canvas.height - headerHeight - footerHeight; 

            // Draw Before Image
            if (beforeImg) {
                drawImageCover(ctx, beforeImg, 0, headerHeight, imgWidth, imgHeight);
                drawTag("ก่อนดำเนินการ", 0, headerHeight + 15);
            } else {
                ctx.fillStyle = '#eeeeee';
                ctx.fillRect(0, headerHeight, imgWidth, imgHeight);
            }

            // Draw After Image
            if (afterImg) {
                drawImageCover(ctx, afterImg, imgWidth, headerHeight, imgWidth, imgHeight);
                drawTag("หลังดำเนินการ", imgWidth, headerHeight + 15);
            } else {
                ctx.fillStyle = '#e0e0e0';
                ctx.fillRect(imgWidth, headerHeight, imgWidth, imgHeight);
            }

            // Divider line
            ctx.beginPath();
            ctx.moveTo(imgWidth, headerHeight);
            ctx.lineTo(imgWidth, headerHeight + imgHeight);
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();

            // Draw Title Text
            ctx.fillStyle = '#333333';
            ctx.font = 'bold 36px "Sarabun", sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(title, 30, headerHeight / 2);

            // Draw Description Text
            ctx.fillStyle = '#555555'; 
            ctx.font = '24px "Sarabun", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(desc, canvas.width / 2, canvas.height - (footerHeight / 2));
        }

        function drawTag(text, sectionX, sectionY) {
            ctx.save();
            ctx.font = 'bold 24px "Sarabun", sans-serif';
            
            const textMetrics = ctx.measureText(text);
            const textWidth = textMetrics.width;
            
            const paddingX = 20;
            const boxWidth = textWidth + paddingX * 2;
            const boxHeight = 50;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
            ctx.fillRect(sectionX, sectionY, boxWidth, boxHeight);
            
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, sectionX + (boxWidth / 2), sectionY + (boxHeight / 2) + 2);
            
            ctx.restore();
        }

        function drawImageCover(ctx, img, x, y, w, h) {
            let ratio = Math.max(w / img.width, h / img.height);
            let centerShift_x = (w - img.width * ratio) / 2;
            let centerShift_y = (h - img.height * ratio) / 2;  
            
            ctx.save();
            ctx.beginPath();
            ctx.rect(x, y, w, h);
            ctx.clip(); 
            
            ctx.drawImage(img, 0, 0, img.width, img.height,
                          x + centerShift_x, y + centerShift_y, img.width * ratio, img.height * ratio);
            ctx.restore();
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'before-after-result.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        window.onload = init;
    </script>
</body>
</html>
